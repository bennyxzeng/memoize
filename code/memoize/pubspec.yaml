name: memoize
description: "A spaced repetition flashcard app built with Flutter using Drift Database for local storage and Provider for state management."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # This is used for internationalization.
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  uuid: ^4.5.1
  shake_gesture: ^2.1.0

  path_provider: ^2.1.5
  intl: ^0.20.2
  drift: ^2.28.2
  drift_flutter: ^0.2.7

  # This is used for fetching definitions from the dictionary API (Querying Web Sevices Using APIs)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.28.3

flutter:
  uses-material-design: true
  generate: true
